<header class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold text-white">株式ラジオ</h1>
    <button id="open-settings-btn" class="relative z-[9999] p-3 bg-gray-800 rounded-xl border border-gray-700 pointer-events-auto">⚙️</button>
</header>

<button id="generate-btn" class="relative z-[50] w-full bg-amber-400 p-4 rounded-2xl text-gray-900 font-bold mb-6 pointer-events-auto">
    今日の原稿を生成する
</button>

<script>
    // 生成ボタンのロジックを修正
    document.getElementById('generate-btn').addEventListener('click', async () => {
        const url = localStorage.getItem('worker_url');
        const statusText = document.getElementById('status-text');
        document.getElementById('status-card').classList.remove('hidden');
        
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: 'claude-sonnet-4-6',
                    max_tokens: 4096,
                    messages: [{ role: "user", content: "今日の株式マーケットラジオの原稿を作成してください。" }]
                })
            });
            const data = await response.json();
            if (!response.ok) throw new Error(data.error?.message || '不明なエラー');
            alert('生成完了！');
        } catch (e) {
            alert('エラー: ' + e.message);
        }
    });

    // 設定ボタンのクリックを修正
    document.getElementById('open-settings-btn').addEventListener('click', (e) => {
        e.stopPropagation(); // クリックの伝播を停止
        const key = prompt("API Keyを入力");
        const worker = prompt("Worker URLを入力");
        if(key) localStorage.setItem('api_key', key);
        if(worker) localStorage.setItem('worker_url', worker);
    });
</script>
