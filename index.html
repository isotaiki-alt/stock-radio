<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>株式マーケットラジオ</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #111827; color: #F9FAFB; }
        /* クリックを阻害しないための強制設定 */
        .btn-force { cursor: pointer !important; pointer-events: auto !important; position: relative; z-index: 50; }
    </style>
</head>
<body class="min-h-screen pb-32">
    <div class="max-w-md mx-auto p-4 pt-6">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold">株式ラジオ</h1>
            <button id="open-settings-btn" class="btn-force p-3 bg-gray-800 rounded-xl border border-gray-700">⚙️</button>
        </header>

        <button id="generate-btn" class="btn-force w-full bg-amber-400 p-4 rounded-2xl text-gray-900 font-bold mb-6">
            今日の原稿を生成する
        </button>

        <div id="status-card" class="bg-gray-800 p-4 rounded-2xl mb-6 hidden border border-gray-700">
            <p id="status-text" class="text-sm font-mono"></p>
        </div>
    </div>

    <script>
        // 【完全固定】指定されたモデル名のみを送信する
        const TARGET_MODEL = 'claude-sonnet-4-6';

        document.getElementById('generate-btn').addEventListener('click', async () => {
            const url = localStorage.getItem('worker_url');
            if (!url) return alert('Worker URLが設定されていません。');

            const statusCard = document.getElementById('status-card');
            const statusText = document.getElementById('status-text');
            
            statusCard.classList.remove('hidden');
            statusText.innerText = '生成中... (モデル: ' + TARGET_MODEL + ')';

            try {
                // 通信を同期的に待機し、エラーがあればcatchへ飛ばす
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: TARGET_MODEL, // モデル名を定数で強制注入
                        apiKey: localStorage.getItem('api_key')
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error?.message || '生成失敗: ' + response.status);
                }

                statusText.innerText = '生成完了しました！';
                alert('生成完了しました！');
            } catch (e) {
                console.error(e);
                statusText.innerText = 'エラー: ' + e.message;
                alert('エラー: ' + e.message + '\n※モデル名がAPI側で拒否されている可能性があります。');
            }
        });
    </script>
</body>
</html>
