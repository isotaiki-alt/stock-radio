<button id="settings-btn" style="position:fixed; top:10px; right:10px; z-index:99999; padding:20px; background:gold; border-radius:10px; font-weight:bold;">
    ⚙️ 設定
</button>

<script>
    // 設定ボタンのクリック監視（document全体で補足）
    document.addEventListener('click', (e) => {
        if (e.target.id === 'settings-btn') {
            const key = prompt("API Keyを入力:");
            const url = prompt("Worker URLを入力:");
            if(key) localStorage.setItem('api_key', key);
            if(url) localStorage.setItem('worker_url', url);
            alert("設定を保存しました。生成ボタンを試してください。");
        }
    });

    // 生成処理
    document.getElementById('generate-btn').onclick = async () => {
        const url = localStorage.getItem('worker_url');
        if (!url) return alert('設定からURLを入力してください');
        
        try {
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    model: 'claude-sonnet-4-6',
                    messages: [{ role: "user", content: "株式マーケットラジオの原稿を作成" }]
                })
            });
            const data = await res.json();
            if(!res.ok) throw new Error(data.error?.message || "エラー");
            alert("生成成功！");
        } catch(e) {
            alert("エラー: " + e.message);
        }
    };
</script>
