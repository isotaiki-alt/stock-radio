<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>株式マーケットラジオ</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #111827; color: #F9FAFB; }
        .fixed-settings { position: fixed; top: 20px; right: 20px; z-index: 99999; cursor: pointer; }
    </style>
</head>
<body class="min-h-screen pb-32">
    <button id="open-settings-btn" class="fixed-settings p-3 bg-gray-800 rounded-xl border border-gray-700">⚙️</button>

    <div class="max-w-md mx-auto p-4 pt-20">
        <header class="mb-6">
            <h1 class="text-2xl font-bold">株式ラジオ</h1>
        </header>

        <button id="generate-btn" class="w-full bg-amber-400 p-4 rounded-2xl text-gray-900 font-bold mb-6">
            今日の原稿を生成する
        </button>

        <div id="status-card" class="bg-gray-800 p-4 rounded-2xl mb-6 hidden border border-gray-700">
            <p id="status-text" class="text-sm font-mono"></p>
        </div>
    </div>

    <script>
        // 設定用イベント
        document.getElementById('open-settings-btn').addEventListener('click', () => {
            const key = prompt("API Keyを入力:");
            const worker = prompt("Worker URLを入力:");
            if(key) localStorage.setItem('api_key', key);
            if(worker) localStorage.setItem('worker_url', worker);
        });

        // 生成処理
        document.getElementById('generate-btn').addEventListener('click', async () => {
            const url = localStorage.getItem('worker_url');
            if (!url) return alert('Worker URLが未設定です。設定ボタンから入力してください。');

            const statusCard = document.getElementById('status-card');
            const statusText = document.getElementById('status-text');
            statusCard.classList.remove('hidden');
            statusText.innerText = '生成中...';

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-6',
                        max_tokens: 4096,
                        messages: [{ role: "user", content: "今日の株式マーケットのラジオ原稿を生成してください。" }]
                    })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error?.message || '生成失敗');
                
                statusText.innerText = '生成完了しました！';
                alert('生成完了しました！');
            } catch (e) {
                alert('エラー: ' + e.message);
            }
        });
    </script>
</body>
</html>
